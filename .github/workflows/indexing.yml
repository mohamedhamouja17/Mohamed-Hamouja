name: Global Indexing
on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * *' # Runs daily
jobs:
  index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
      - run: npm install  # <--- This is the important line
      - run: node index-urls.js
        env:
          GOOGLE_CREDS: ${{ secrets.GOOGLE_CREDS }}
